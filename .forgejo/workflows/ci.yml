            cargo install wasm-pack --locked
          fi
          command -v pnpm >/dev/null 2>&1 || npm install -g pnpm || corepack enable || true
          scripts/build-browser-assets.sh
          cargo nextest run
          cargo xtask integration
          if [[ "${GITHUB_REF_TYPE:-}" == "tag" && -n "${GITHUB_REF_NAME:-}" ]]; then
