          mkdir -p dist
          cp target/release/ddc dist/
          chmod +x dist/ddc
          #!/bin/bash
          set -euo pipefail

          echo 'Verifying all required artifacts exist in dist/'
          missing=0

          if [[ ! -x dist/ddc ]]; then
            echo '❌ MISSING: ddc'
            missing=1
          else
            echo '✓ ddc'
          fi

          if [[ $missing -eq 1 ]]; then
            echo ''
            echo 'ERROR: Some required binaries are missing!'
            echo 'This usually means a ddc build job failed or artifact upload was incomplete.'
            exit 1
          fi

          echo ''
          echo 'All artifacts verified.'

        shell: bash
      - name: Assemble archive
        run: |-
          set -euo pipefail
          cd "$STABLE_SRC"
          if ! command -v xz >/dev/null 2>&1 && command -v brew >/dev/null 2>&1; then
            HOMEBREW_NO_AUTO_UPDATE=1 HOMEBREW_NO_INSTALLED_DEPENDENTS_CHECK=1 brew install xz
          fi
          bash scripts/assemble-archive.sh aarch64-apple-darwin
          mkdir -p "$GITHUB_WORKSPACE/dist"
          cp "dodeca-aarch64-apple-darwin.tar.xz" "$GITHUB_WORKSPACE/dist/"
          ls -la "$GITHUB_WORKSPACE/dist/"
        shell: bash
      - name: Upload artifact
        uses: "https://data.forgejo.org/actions/upload-artifact@v3"
        with:
          name: build-macos-arm64
          path: dist/dodeca-aarch64-apple-darwin.tar.xz
  publish:
    name: Publish release
    runs-on:
      - linux-x86_64-trusted
    container:
      image: "code.vixen.rs/vixen/vixen-ci:latest"
      volumes:
        - "/srv/ci/cache/dodeca:/srv/ci/cache/dodeca"
    timeout-minutes: 30
    needs:
      - forgejo-linux-x64
      - forgejo-macos-arm64
    if: "startsWith(github.ref, 'refs/tags/')"
    env:
      HOME: /srv/ci/cache/dodeca/home
      FORGEJO_TOKEN: ${{ github.token }}
