          cargo build --release
          actual="$(target/release/ddc --version)"
          echo "$actual"
          if [[ "${GITHUB_REF_TYPE:-}" == "tag" && -n "${GITHUB_REF_NAME:-}" ]]; then
            expected="ddc ${GITHUB_REF_NAME#v}"
            if [[ "$actual" != "$expected" ]]; then
              echo "Expected '$expected', got '$actual'" >&2
              exit 1
            fi
