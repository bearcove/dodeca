      - name: Download WASM from CAS
        run: |-
          ./scripts/cas-download.ts "ci/${{ github.run_id }}/wasm.tar.gz" /tmp/wasm.tar.gz
          tar -xzf /tmp/wasm.tar.gz
      - name: Install xz (macOS)
        run: if ! command -v xz >/dev/null 2>&1 && command -v brew >/dev/null 2>&1; then HOMEBREW_NO_AUTO_UPDATE=1 HOMEBREW_NO_INSTALLED_DEPENDENTS_CHECK=1 brew install xz; fi
      - name: List binaries
        run: ls -la target/release/
      - name: Assemble archive
        run: bash scripts/assemble-archive.sh x86_64-unknown-linux-gnu
      - name: Upload archive to CAS
        run: "./scripts/cas-upload.ts \"dodeca-x86_64-unknown-linux-gnu.tar.xz\" \"ci/${{ github.run_id }}/dodeca-x86_64-unknown-linux-gnu.tar.xz\""
  build-ddc-macos-arm64:
    name: Build ddc (macos-arm64)
    runs-on:
      - mac
    timeout-minutes: 30
    needs:
      - build-wasm
    env:
      CAS_SSH_KEY: ${{ secrets.CAS_SSH_KEY }}
    steps:
      - name: Checkout
        uses: "https://github.com/actions/checkout@v4"
      - name: Install Rust
        uses: "https://github.com/dtolnay/rust-toolchain@master"
        with:
          toolchain: 1.92.0
      - name: Download WASM from CAS
        run: |-
          ./scripts/cas-download.ts "ci/${{ github.run_id }}/wasm.tar.gz" /tmp/wasm.tar.gz
          tar -xzf /tmp/wasm.tar.gz
      - name: Build ddc
        run: |-
          set -euo pipefail
          if [[ "${GITHUB_REF_TYPE:-}" == "tag" && -n "${GITHUB_REF_NAME:-}" ]]; then
            export DODECA_RELEASE_VERSION="${GITHUB_REF_NAME}"
          fi
          cargo build --release --bin ddc --verbose
          actual="$(target/release/ddc --version)"
          echo "$actual"
          if [[ "${GITHUB_REF_TYPE:-}" == "tag" && -n "${GITHUB_REF_NAME:-}" ]]; then
            expected="ddc ${GITHUB_REF_NAME#v}"
            if [[ "$actual" != "$expected" ]]; then
              echo "Expected '$expected', got '$actual'" >&2
              exit 1
            fi
          fi
        shell: bash
      - name: Test ddc
        run: |-
          set -euo pipefail
          if [[ "${GITHUB_REF_TYPE:-}" == "tag" && -n "${GITHUB_REF_NAME:-}" ]]; then
            export DODECA_RELEASE_VERSION="${GITHUB_REF_NAME}"
          fi
          cargo test --release --bin ddc
        shell: bash
      - name: Upload ddc to CAS
        run: "./scripts/cas-upload.ts target/release/ddc \"ci/${{ github.run_id }}/ddc-macos-arm64\""
