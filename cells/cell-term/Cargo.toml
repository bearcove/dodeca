[package]
autobins = false
name = "cell-term"
version = "0.6.1"
edition = "2024"

[package.metadata]

[package.metadata."docs.rs"]
rustdoc-args = ["--html-in-header", "arborium-header.html"]

[lib]
name = "ddc_cell_term"
crate-type = ["cdylib", "rlib"]
path = "src/main.rs"

[features]
default = ["dynamic-cell"]
dynamic-cell = ["dep:dodeca-cell-runtime"]

[dependencies]
cell-term-proto = { path = "../cell-term-proto" }
dodeca-cell-runtime = { path = "../../crates/dodeca-cell-runtime", optional = true }

# ANSI parsing
anstyle-parse = "0.2"

# PTY
portable-pty = "0.8"

# Clipboard
arboard = "3"

# Terminal size
term_size = "0.3"

# Async runtime
tokio = { version = "1", features = ["rt", "sync"] }

# Unix-specific
[target.'cfg(unix)'.dependencies]
nix = { version = "0.29", features = ["term", "process"] }
