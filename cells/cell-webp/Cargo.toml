[package]
autobins = false
name = "cell-webp"
version = "0.0.0"
edition = "2024"

[package.metadata]

[package.metadata."docs.rs"]
rustdoc-args = ["--html-in-header", "arborium-header.html"]

[lib]
name = "ddc_cell_webp"
crate-type = ["rlib"]
path = "src/main.rs"

[dependencies]
cell-webp-proto = { path = "../cell-webp-proto" }
webp.workspace = true
