[package]
autobins = false
name = "cell-search"
version = "0.6.1"
edition = "2024"
rust-version = "1.91"
description = "Full-text search indexing cell for dodeca"
license = "MIT OR Apache-2.0"
publish = false

[package.metadata]

[package.metadata."docs.rs"]
rustdoc-args = ["--html-in-header", "arborium-header.html"]

[lib]
name = "ddc_cell_search"
crate-type = ["rlib"]
path = "src/main.rs"

[dependencies]
cell-search-proto = { path = "../cell-search-proto" }
dodeca-search-format = { path = "../../crates/dodeca-search-format" }
hotmeal.workspace = true
tracing.workspace = true
