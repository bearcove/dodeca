[package]
name = "dodeca-devtools"
version = "0.0.0"
edition = "2024"
rust-version = "1.91"
description = "Browser runtime for dodeca DevTools"
publish = false

[package.metadata.docs.rs]
rustdoc-args = ["--html-in-header", "arborium-header.html"]

[package.metadata."docs.rs"]
rustdoc-args = ["--html-in-header", "arborium-header.html"]

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
# Internal crates
dodeca-protocol = { path = "../dodeca-protocol" }
livereload-client = { path = "../livereload-client" }

# RPC transport (wasm: websocket only, no ffi)
vox.workspace = true
vox-websocket = "0.10.0-rc.5"

# Utilities
getrandom.workspace = true
tracing.workspace = true
tracing-wasm.workspace = true
wasm-bindgen.workspace = true
wasm-bindgen-futures = "0.4"

[dependencies.web-sys]
workspace = true
features = [
  "WebSocket",
  "MessageEvent",
  "ErrorEvent",
  "CloseEvent",
  "CssStyleDeclaration",
  "Document",
  "DomRect",
  "Element",
  "EventTarget",
  "HtmlElement",
  "KeyboardEvent",
  "MouseEvent",
  "Node",
  "Window",
]

[dev-dependencies]

[package.metadata.cargo-shear]
ignored = ["getrandom"]
