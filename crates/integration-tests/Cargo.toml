[package]
name = "integration-tests"
version = "0.6.1"
edition = "2024"
rust-version = "1.91"
publish = false

[[bin]]
name = "integration-tests"
path = "src/main.rs"

[dependencies]
dodeca-search-format = { path = "../dodeca-search-format" }
dodeca-protocol = { path = "../dodeca-protocol" }
camino.workspace = true
facet-json.workspace = true
facet-value.workspace = true
hotmeal.workspace = true
fs-err.workspace = true
globset.workspace = true
owo-colors.workspace = true
regex.workspace = true
reqwest = { version = "0.13", default-features = false }
# vox RPC + websocket transport for the in-browser editor client (mirrors
# crates/dodeca-devtools, the browser editor). `runtime` carries the client
# Driver/Caller/Session; vox-websocket gives the native (tokio-tungstenite) link.
vox.workspace = true
vox-websocket = "0.9.0-rc.0"
vox-fdpass.workspace = true
vox-stream.workspace = true
tempfile.workspace = true
tokio.workspace = true
tracing.workspace = true
tracing-subscriber.workspace = true
tower-lsp.workspace = true
ur-taking-me-with-you.workspace = true

[dev-dependencies]
