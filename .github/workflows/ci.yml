          fi

          if [[ ! -f dist/libddc_cell_gingembre.dylib ]]; then
            echo '❌ MISSING: libddc_cell_gingembre.dylib'
            missing=1
          else
            echo '✓ libddc_cell_gingembre.dylib'
          fi

          if [[ ! -f dist/libddc_cell_html.dylib ]]; then
            echo '❌ MISSING: libddc_cell_html.dylib'
            missing=1
          else
            echo '✓ libddc_cell_html.dylib'
          fi

          if [[ ! -f dist/libddc_cell_html_diff.dylib ]]; then
            echo '❌ MISSING: libddc_cell_html_diff.dylib'
            missing=1
          else
