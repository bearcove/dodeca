    timeout-minutes: 30
    needs:
      - build-ddc-macos-arm64
      - build-wasm
      - build-cells-macos-arm64-1
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.92.0
      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: "true"
          cache-targets: "false"
          cache-bin: "false"
      - name: Download WASM
        uses: actions/download-artifact@v4
        with:
          name: dodeca-devtools-wasm
          path: crates/dodeca-devtools/pkg
      - name: Download search WASM
        uses: actions/download-artifact@v4
        with:
          name: dodeca-search-wasm
          path: crates/dodeca-search-wasm/pkg
      - name: Build integration-tests
        run: cargo build -p integration-tests
      - name: Download ddc
        uses: actions/download-artifact@v4
        with:
          name: ddc-macos-arm64
          path: dist
      - name: Download cells
        uses: actions/download-artifact@v4
        with:
          pattern: cells-macos-arm64-*
          path: dist
          merge-multiple: "true"
      - name: Flatten cell directories
        run: find dist -mindepth 2 -type f -exec mv -t dist {} + 2>/dev/null || true; find dist -mindepth 1 -type d -empty -delete 2>/dev/null || true
      - name: Prepare artifacts
        run: chmod +x dist/ddc && ls -la dist/
      - name: Verify artifacts
        run: |
          #!/bin/bash
          set -euo pipefail

          echo 'Verifying all required artifacts exist in dist/'
          missing=0

          if [[ ! -x dist/ddc ]]; then
            echo '❌ MISSING: ddc'
            missing=1
          else
            echo '✓ ddc'
          fi

          if [[ ! -f dist/libddc_cell_authoring_lsp.dylib ]]; then
            echo '❌ MISSING: libddc_cell_authoring_lsp.dylib'
            missing=1
          else
            echo '✓ libddc_cell_authoring_lsp.dylib'
          fi

          if [[ ! -f dist/libddc_cell_code_execution.dylib ]]; then
            echo '❌ MISSING: libddc_cell_code_execution.dylib'
            missing=1
          else
            echo '✓ libddc_cell_code_execution.dylib'
          fi

          if [[ ! -f dist/libddc_cell_css.dylib ]]; then
            echo '❌ MISSING: libddc_cell_css.dylib'
            missing=1
          else
            echo '✓ libddc_cell_css.dylib'
          fi

          if [[ ! -f dist/libddc_cell_data.dylib ]]; then
            echo '❌ MISSING: libddc_cell_data.dylib'
            missing=1
          else
            echo '✓ libddc_cell_data.dylib'
          fi

          if [[ ! -f dist/libddc_cell_dialoguer.dylib ]]; then
            echo '❌ MISSING: libddc_cell_dialoguer.dylib'
            missing=1
          else
