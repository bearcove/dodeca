          fi

          if [[ ! -f dist/libddc_cell_search.dylib ]]; then
            echo '❌ MISSING: libddc_cell_search.dylib'
            missing=1
          else
            echo '✓ libddc_cell_search.dylib'
          fi

          if [[ ! -f dist/libddc_cell_svgo.dylib ]]; then
            echo '❌ MISSING: libddc_cell_svgo.dylib'
            missing=1
          else
