          fi

          if [[ ! -f dist/libddc_cell_image.dylib ]]; then
            echo '❌ MISSING: libddc_cell_image.dylib'
            missing=1
          else
            echo '✓ libddc_cell_image.dylib'
          fi

          if [[ ! -f dist/libddc_cell_js.dylib ]]; then
            echo '❌ MISSING: libddc_cell_js.dylib'
            missing=1
          else
            echo '✓ libddc_cell_js.dylib'
          fi

          if [[ ! -f dist/libddc_cell_jxl.dylib ]]; then
            echo '❌ MISSING: libddc_cell_jxl.dylib'
            missing=1
          else
            echo '✓ libddc_cell_jxl.dylib'
          fi

          if [[ ! -f dist/libddc_cell_linkcheck.dylib ]]; then
            echo '❌ MISSING: libddc_cell_linkcheck.dylib'
            missing=1
          else
            echo '✓ libddc_cell_linkcheck.dylib'
          fi

          if [[ ! -f dist/libddc_cell_markdown.dylib ]]; then
            echo '❌ MISSING: libddc_cell_markdown.dylib'
